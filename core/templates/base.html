{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DigitalHub{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>

{% if messages %}
<div class="mensagens-globais">
  {% for message in messages %}
  <div class="mensagem mensagem--{{ message.tags }}">
    <span>{{ message }}</span>
    <button class="mensagem__fechar" onclick="this.parentElement.remove()">✕</button>
  </div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
